const IMG_PREFIX = 'cal_img_'; // 이미지 파일명: cal_img_{todoId}.jpg

// ── 이미지 압축 (600px / JPEG 0.7)
const compressImage = (file) => new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => {
        const img = new Image();
        img.onload = () => {
            const MAX = 600;
            let { width: w, height: h } = img;
            if (w > h && w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
            else if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            canvas.toBlob(resolve, 'image/jpeg', 0.7);
        };
        img.src = reader.result;
    };
    reader.readAsDataURL(file);
});

// ── Google Drive API 헬퍼 ──────────────────────────────────────────
const driveSearch = async (token, name) => {
    const r = await fetch(
        `https://www.googleapis.com/drive/v3/files?q=name='${name}'+and+trashed=false&fields=files(id,size)`,
        { headers: { Authorization: `Bearer ${token}` } }
    );
    const d = await r.json();
    return (d.files && d.files.length > 0) ? d.files[0] : null;
};

const driveUpload = async (token, name, blob, mimeType) => {
    const existing = await driveSearch(token, name);
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify({ name, mimeType })], { type: 'application/json' }));
    form.append('file', blob);
    const url = existing
        ? `https://www.googleapis.com/upload/drive/v3/files/${existing.id}?uploadType=multipart`
        : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
    const res = await fetch(url, {
        method: existing ? 'PATCH' : 'POST',
        headers: { Authorization: `Bearer ${token}` },
        body: form,
    });
    return res.json();
};

const driveDownloadText = async (token, name) => {
    const file = await driveSearch(token, name);
    if (!file) return null;
    const r = await fetch(
        `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`,
        { headers: { Authorization: `Bearer ${token}` } }
    );
    return r.ok ? r.text() : null;
};

const driveDownloadBlob = async (token, name) => {
    const file = await driveSearch(token, name);
    if (!file) return null;
    const r = await fetch(
        `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`,
        { headers: { Authorization: `Bearer ${token}` } }
    );
    if (!r.ok) return null;
    const blob = await r.blob();
    return URL.createObjectURL(blob);
};

const driveDelete = async (token, name) => {
    const file = await driveSearch(token, name);
    if (!file) return;
    await fetch(`https://www.googleapis.com/drive/v3/files/${file.id}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${token}` },
    });
};

// ── 메인 앱 ──────────────────────────────────────────────────────
const App = () => {
    const today = new Date();
    const [month, setMonth] = useState(today.getMonth());
    // todos: { "2026-03-05": [{id, text, done, hasImage}] }
    // 이미지는 드라이브에 cal_img_{id}.jpg 로 별도 저장
    const [todos, setTodos] = useState({});
    // imageCache: { id: objectURL } — 메모리 캐시 (새로고침 시 초기화)
    const [imageCache, setImageCache] = useState({});
    const [modal, setModal] = useState(null);
    const [viewImage, setViewImage] = useState(null);
    const [syncStatus, setSyncStatus] = useState('');
    const tokenRef = useRef(null);

    // localStorage: 이미지 없이 텍스트만 (용량 문제 완전 해결)
    // ✅ 사파리: 자동 OAuth 팝업 차단 문제로 앱 시작 시 자동 불러오기 제거
    // 사용자가 직접 "불러오기" 버튼을 눌러야만 OAuth 실행
    useEffect(() => {
        const saved = localStorage.getItem('calendar_v6');
        if (saved) { try { setTodos(JSON.parse(saved)); } catch (e) {} }
    }, []);

    useEffect(() => {
        localStorage.setItem('calendar_v6', JSON.stringify(todos));
    }, [todos]);

    // OAuth 토큰 획득 (Promise) — Google SDK 로드 대기 포함
    const getToken = useCallback((prompt = '') => new Promise((resolve) => {
        if (tokenRef.current) { resolve(tokenRef.current); return; }

        // Google SDK가 아직 로드 안 됐으면 최대 10초 대기
        const waitForGoogle = (retries = 20) => {
            if (typeof google !== 'undefined' && google.accounts) {
                try {
                    const client = google.accounts.oauth2.initTokenClient({
                        client_id: CLIENT_ID,
                        scope: SCOPES,
                        callback: (res) => {
                            if (res.access_token) {
                                tokenRef.current = res.access_token;
                                setTimeout(() => { tokenRef.current = null; }, 3500 * 1000);
                                resolve(res.access_token);
                            } else { resolve(null); }
                        },
                    });
                    client.requestAccessToken({ prompt });
                } catch (e) {
                    console.error('Google OAuth 오류:', e);
                    resolve(null);
                }
            } else if (retries > 0) {
                setTimeout(() => waitForGoogle(retries - 1), 500);
            } else {
                console.error('Google SDK 로드 실패');
                resolve(null);
            }
        };
        waitForGoogle();
    }), []);

    // 드라이브에서 텍스트 데이터 불러오기
    // ✅ 사파리: prompt 생략 시 자동으로 'select_account' 사용 (팝업 허용)
    const loadFromDrive = async () => {
        setSyncStatus('불러오는 중...');
        try {
            const token = await getToken('select_account');
            if (!token) { setSyncStatus('❌ 로그인 실패'); setTimeout(() => setSyncStatus(''), 2000); return; }
            const text = await driveDownloadText(token, DATA_FILE);
            if (!text) { setSyncStatus('파일 없음'); setTimeout(() => setSyncStatus(''), 2000); return; }
            const parsed = JSON.parse(text);
            setTodos(parsed);
            localStorage.setItem('calendar_v6', JSON.stringify(parsed));
            setImageCache({});
            setSyncStatus('✓ 불러오기 완료');
        } catch (e) {
            console.error(e);
            setSyncStatus('❌ 불러오기 실패');
        }
        setTimeout(() => setSyncStatus(''), 2500);
    };

    // 드라이브에 텍스트 데이터 저장
    const saveToDrive = async () => {
        setSyncStatus('저장 중...');
        try {
            const token = await getToken('select_account');
            if (!token) { setSyncStatus('❌ 로그인 실패'); setTimeout(() => setSyncStatus(''), 2000); return; }
            const blob = new Blob([JSON.stringify(todos)], { type: 'application/json' });
            await driveUpload(token, DATA_FILE, blob, 'application/json');
            setSyncStatus('✓ 저장 완료');
        } catch (e) {
            console.error(e);
            setSyncStatus('❌ 저장 실패');
        }
        setTimeout(() => setSyncStatus(''), 2500);
    };

    // 이미지 로드 (캐시 → 드라이브)
    const loadImage = useCallback(async (todoId) => {
        if (imageCache[todoId]) return imageCache[todoId];
        try {
            const token = await getToken('');
            if (!token) return null;
            const url = await driveDownloadBlob(token, `${IMG_PREFIX}${todoId}.jpg`);
            if (url) setImageCache(prev => ({ ...prev, [todoId]: url }));
            return url;
        } catch (e) { return null; }
    }, [imageCache, getToken]);

    // 이미지 업로드 (드라이브)
    const uploadImage = useCallback(async (todoId, blob) => {
        try {
            const token = await getToken('');
            if (!token) return false;
            await driveUpload(token, `${IMG_PREFIX}${todoId}.jpg`, blob, 'image/jpeg');
            const url = URL.createObjectURL(blob);
            setImageCache(prev => ({ ...prev, [todoId]: url }));
            return true;
        } catch (e) { console.error(e); return false; }
    }, [getToken]);

    // 이미지 삭제 (드라이브)
    const deleteImage = useCallback(async (todoId) => {
        try {
            const token = await getToken('');
            if (!token) return;
            await driveDelete(token, `${IMG_PREFIX}${todoId}.jpg`);
            setImageCache(prev => {
                const next = { ...prev };
                if (next[todoId]) { URL.revokeObjectURL(next[todoId]); delete next[todoId]; }
                return next;
            });
        } catch (e) { console.error(e); }
    }, [getToken]);

    const fmt = (y, m, d) => `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const daysInMonth = (m) => new Date(2026, m + 1, 0).getDate();
    const startDay = (m) => new Date(2026, m, 1).getDay();

    const monthTodos = () => {
        const result = [];
        for (let d = 1; d <= daysInMonth(month); d++) {
            const date = fmt(2026, month, d);
            const dt = todos[date];
            if (dt && dt.length > 0) result.push({ date, day: d, todos: dt });
        }
        return result;
    };

    const renderCalendar = () => {
        const cells = [];
        for (let i = 0; i < startDay(month); i++) cells.push(<div key={`e-${i}`} />);
        for (let d = 1; d <= daysInMonth(month); d++) {
            const date = fmt(2026, month, d);
            const holiday = holidayData[date];
            const dayTodos = todos[date] || [];
            const total = dayTodos.length;
            const remaining = dayTodos.filter(t => !t.done).length;
            const dow = new Date(2026, month, d).getDay();
            const isToday = today.getFullYear() === 2026 && today.getMonth() === month && today.getDate() === d;
            let color = 'text-slate-600';
            if (holiday?.ph) color = 'text-rose-500 font-bold';
            else if (dow === 0) color = 'text-rose-500 font-bold';
            else if (holiday?.kr) color = 'text-sky-500 font-bold';

            cells.push(
                <div key={d} onClick={() => setModal(date)}
                    className={`calendar-cell p-2 ${isToday ? 'bg-sky-50' : 'bg-white'} cursor-pointer active:bg-slate-50`}>
                    <div className="flex justify-between items-center">
                        <span className={`text-base font-semibold ${color}`}>{d}</span>
                        {total > 0 && <span className="text-[10px] bg-slate-100 px-1.5 py-0.5 rounded text-slate-600 font-medium">{remaining}/{total}</span>}
                    </div>
                    <div className="mt-1.5 space-y-1">
                        {holiday?.kr && <div className="text-[9px] px-1.5 py-0.5 bg-sky-50 text-sky-600 rounded truncate font-medium">{holiday.kr}</div>}
                        {holiday?.ph && <div className="text-[9px] px-1.5 py-0.5 bg-rose-50 text-rose-600 rounded truncate font-semibold">{holiday.ph}</div>}
                    </div>
                </div>
            );
        }
        return cells;
    };

    return (
        <div className="max-w-md mx-auto p-4 min-h-screen pb-10">
            <div className="flex justify-between items-center mb-6 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <button onClick={() => setMonth(m => m > 0 ? m - 1 : 11)} className="p-2 text-slate-400 text-base font-medium">이전</button>
                <div className="text-center">
                    <h1 className="text-xl font-bold">2026년 {month + 1}월</h1>
                    {syncStatus && <div className="text-xs text-sky-500 mt-1">{syncStatus}</div>}
                </div>
                <button onClick={() => setMonth(m => m < 11 ? m + 1 : 0)} className="p-2 text-slate-400 text-base font-medium">다음</button>
            </div>

            <div className="flex gap-2 mb-4">
                <button onClick={loadFromDrive} className="flex-1 bg-sky-500 text-white py-3 rounded-2xl text-sm font-bold shadow-sm">↓ 불러오기</button>
                <button onClick={saveToDrive} className="flex-1 bg-slate-900 text-white py-3 rounded-2xl text-sm font-bold shadow-sm">↑ 저장하기</button>
            </div>

            <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden mb-6">
                <div className="grid grid-cols-7 bg-slate-50/50 py-3 text-center border-b border-slate-100 text-xs font-bold text-slate-400">
                    {['일','월','화','수','목','금','토'].map(d => <div key={d}>{d}</div>)}
                </div>
                <div className="grid grid-cols-7">{renderCalendar()}</div>
            </div>

            {monthTodos().length > 0 && (
                <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden p-6">
                    <h2 className="text-lg font-bold mb-4">이번 달 할 일</h2>
                    <div className="space-y-4 max-h-96 overflow-y-auto hide-scrollbar">
                        {monthTodos().map(({ date, day, todos: dayTodos }) => (
                            <div key={date} className="border-b border-slate-100 pb-4 last:border-0">
                                <div className="text-base font-bold text-slate-600 mb-2">{month + 1}월 {day}일</div>
                                <div className="space-y-2">
                                    {dayTodos.map(t => (
                                        <div key={t.id} className="flex items-start gap-2">
                                            <div className={`flex-1 text-base ${t.done ? 'todo-done' : 'text-slate-700'}`}>{t.text}</div>
                                            {t.hasImage && <ThumbImage todoId={t.id} loadImage={loadImage} onClick={setViewImage} />}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            )}

            {modal && (
                <Modal date={modal} onClose={() => setModal(null)}
                    todos={todos} setTodos={setTodos}
                    loadImage={loadImage} uploadImage={uploadImage} deleteImage={deleteImage}
                    setViewImage={setViewImage} setSyncStatus={setSyncStatus} />
            )}

            {viewImage && (
                <div onClick={() => setViewImage(null)} className="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-[60]">
                    <div className="relative max-w-4xl max-h-[90vh] w-full h-full flex items-center justify-center">
                        <button onClick={() => setViewImage(null)}
                            className="absolute top-4 right-4 text-white text-4xl z-10 bg-black/50 w-12 h-12 rounded-full flex items-center justify-center">×</button>
                        <img src={viewImage} alt="확대 보기" className="max-w-full max-h-full object-contain rounded-lg" onClick={e => e.stopPropagation()} />
                    </div>
                </div>
            )}
        </div>
    );
};

// ── 썸네일 (Lazy Load) ───────────────────────────────────────────
const ThumbImage = ({ todoId, loadImage, onClick }) => {
    const [src, setSrc] = useState(null);
    useEffect(() => {
        let cancelled = false;
        loadImage(todoId).then(url => { if (!cancelled) setSrc(url); });
        return () => { cancelled = true; };
    }, [todoId]);
    if (!src) return <div className="w-12 h-12 rounded bg-slate-100 animate-pulse" />;
    return <img src={src} alt="첨부" className="w-12 h-12 rounded object-cover cursor-pointer hover:opacity-80" onClick={() => onClick(src)} />;
};

const ModalThumbImage = ({ todoId, loadImage, onView }) => {
    const [src, setSrc] = useState(null);
    useEffect(() => {
        let cancelled = false;
        loadImage(todoId).then(url => { if (!cancelled) setSrc(url); });
        return () => { cancelled = true; };
    }, [todoId]);
    if (!src) return <div className="mt-2 h-20 w-20 rounded-lg bg-slate-200 animate-pulse" />;
    return <img src={src} alt="첨부" className="mt-2 h-20 w-auto rounded-lg object-cover cursor-pointer hover:opacity-80 border border-slate-200"
        onClick={e => { e.stopPropagation(); onView(src); }} />;
};

// ── 모달 ─────────────────────────────────────────────────────────
const Modal = ({ date, onClose, todos, setTodos, loadImage, uploadImage, deleteImage, setViewImage, setSyncStatus }) => {
    const [text, setText] = useState('');
    const [pendingBlob, setPendingBlob] = useState(null);
    const [pendingPreview, setPendingPreview] = useState(null);
    const [uploading, setUploading] = useState(false);
    const [editingId, setEditingId] = useState(null);
    const [editText, setEditText] = useState('');
    const [movingId, setMovingId] = useState(null);
    const [moveMonth, setMoveMonth] = useState(parseInt(date.split('-')[1]) - 1);
    const [moveDay, setMoveDay] = useState(parseInt(date.split('-')[2]));

    const handleImageChange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const blob = await compressImage(file);
        setPendingBlob(blob);
        setPendingPreview(URL.createObjectURL(blob));
    };

    const clearPending = () => {
        if (pendingPreview) URL.revokeObjectURL(pendingPreview);
        setPendingBlob(null); setPendingPreview(null);
    };

    // 추가: 텍스트는 즉시 저장, 이미지는 드라이브에 별도 업로드
    const add = async () => {
        if (!text.trim() && !pendingBlob) return;
        const id = Date.now();
        const newTodo = { id, text: text || '', done: false, hasImage: !!pendingBlob };
        setTodos(p => ({ ...p, [date]: [...(p[date] || []), newTodo] }));
        setText('');

        if (pendingBlob) {
            const blob = pendingBlob;
            clearPending();
            setUploading(true);
            setSyncStatus('📤 사진 업로드 중...');
            const ok = await uploadImage(id, blob);
            setUploading(false);
            if (!ok) {
                // 업로드 실패 시 hasImage 제거
                setTodos(p => ({ ...p, [date]: (p[date] || []).map(t => t.id === id ? { ...t, hasImage: false } : t) }));
                setSyncStatus('❌ 사진 업로드 실패');
            } else {
                setSyncStatus('✓ 사진 저장 완료');
            }
            setTimeout(() => setSyncStatus(''), 2500);
        } else {
            clearPending();
        }
    };

    const toggle = (id) => setTodos(p => ({ ...p, [date]: p[date].map(t => t.id === id ? { ...t, done: !t.done } : t) }));

    const remove = async (id) => {
        const todo = (todos[date] || []).find(t => t.id === id);
        setTodos(p => {
            const filtered = p[date].filter(t => t.id !== id);
            const next = { ...p };
            if (filtered.length === 0) delete next[date]; else next[date] = filtered;
            return next;
        });
        if (todo?.hasImage) deleteImage(id);
    };

    const startEdit = (t) => { setEditingId(t.id); setEditText(t.text); };
    const saveEdit = (id) => {
        if (!editText.trim()) { setEditingId(null); return; }
        setTodos(p => ({ ...p, [date]: p[date].map(t => t.id === id ? { ...t, text: editText } : t) }));
        setEditingId(null); setEditText('');
    };

    const startMove = (t) => {
        setMovingId(t.id);
        const [, m, d] = date.split('-');
        setMoveMonth(parseInt(m) - 1); setMoveDay(parseInt(d));
    };

    const executeMove = (id) => {
        const newDate = `2026-${String(moveMonth + 1).padStart(2, '0')}-${String(moveDay).padStart(2, '0')}`;
        if (newDate === date) { setMovingId(null); return; }
        setTodos(p => {
            const item = p[date].find(t => t.id === id);
            if (!item) return p;
            const filtered = p[date].filter(t => t.id !== id);
            const next = { ...p };
            if (filtered.length === 0) delete next[date]; else next[date] = filtered;
            next[newDate] = [...(next[newDate] || []), item];
            return next;
        });
        setMovingId(null);
    };

    const daysInMoveMonth = new Date(2026, moveMonth + 1, 0).getDate();

    return (
        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-end z-50" onClick={onClose}>
            <div className="bg-white w-full rounded-t-[32px] p-6 pb-12 max-h-[85vh] overflow-y-auto hide-scrollbar" onClick={e => e.stopPropagation()}>
                <div className="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-6 cursor-pointer" onClick={onClose} />
                <h2 className="text-xl font-bold mb-6">{date} 메모</h2>

                <div className="flex gap-2 mb-4">
                    <input value={text} onChange={e => setText(e.target.value)}
                        onKeyPress={e => e.key === 'Enter' && !uploading && add()}
                        className="flex-1 bg-slate-50 rounded-xl px-4 py-3 text-base outline-none" placeholder="할 일 입력" />
                    <button onClick={add} disabled={uploading}
                        className="bg-slate-900 text-white px-6 rounded-xl font-bold text-sm disabled:opacity-50">
                        {uploading ? '...' : '추가'}
                    </button>
                </div>

                <div className="flex gap-2 mb-4">
                    <label className="flex-1 bg-slate-100 py-3 rounded-2xl text-center text-sm font-bold cursor-pointer">
                        📷 {pendingPreview ? '선택됨' : '사진 선택'}
                        <input type="file" className="hidden" accept="image/*" onChange={handleImageChange} />
                    </label>
                    {pendingPreview && (
                        <button onClick={clearPending} className="bg-rose-100 text-rose-600 px-4 rounded-2xl text-sm font-bold">취소</button>
                    )}
                </div>

                {pendingPreview && (
                    <div className="mb-4 w-full h-32 bg-slate-100 rounded-2xl overflow-hidden flex items-center justify-center">
                        <img src={pendingPreview} className="h-full object-contain" alt="미리보기" />
                    </div>
                )}

                <div className="space-y-3 max-h-80 overflow-y-auto hide-scrollbar mb-6">
                    {(todos[date] || []).map(t => (
                        <div key={t.id} className="p-3 bg-slate-50 rounded-xl">
                            {editingId === t.id ? (
                                <div className="space-y-2">
                                    <input value={editText} onChange={e => setEditText(e.target.value)}
                                        onKeyPress={e => e.key === 'Enter' && saveEdit(t.id)}
                                        className="w-full px-3 py-2 bg-white rounded-lg text-base outline-none border border-slate-200" autoFocus />
                                    <div className="flex gap-2">
                                        <button onClick={() => saveEdit(t.id)} className="flex-1 bg-slate-900 text-white py-2 rounded-lg text-sm font-bold">저장</button>
                                        <button onClick={() => { setEditingId(null); setEditText(''); }} className="flex-1 bg-slate-200 text-slate-700 py-2 rounded-lg text-sm font-bold">취소</button>
                                    </div>
                                </div>
                            ) : movingId === t.id ? (
                                <div className="space-y-3">
                                    <div className="text-sm font-medium text-slate-700">날짜 선택</div>
                                    <div className="flex gap-2">
                                        <select value={moveMonth} onChange={e => {
                                            const m = parseInt(e.target.value); setMoveMonth(m);
                                            if (moveDay > new Date(2026, m + 1, 0).getDate()) setMoveDay(1);
                                        }} className="flex-1 px-3 py-2 bg-white rounded-lg text-base outline-none border border-slate-200">
                                            {Array.from({ length: 12 }, (_, i) => <option key={i} value={i}>{i + 1}월</option>)}
                                        </select>
                                        <select value={moveDay} onChange={e => setMoveDay(parseInt(e.target.value))}
                                            className="flex-1 px-3 py-2 bg-white rounded-lg text-base outline-none border border-slate-200">
                                            {Array.from({ length: daysInMoveMonth }, (_, i) => <option key={i} value={i + 1}>{i + 1}일</option>)}
                                        </select>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => executeMove(t.id)} className="flex-1 bg-sky-500 text-white py-2 rounded-lg text-sm font-bold">이동</button>
                                        <button onClick={() => setMovingId(null)} className="flex-1 bg-slate-200 text-slate-700 py-2 rounded-lg text-sm font-bold">취소</button>
                                    </div>
                                </div>
                            ) : (
                                <div className="flex items-start gap-3">
                                    <div onClick={() => toggle(t.id)} className="flex-1 cursor-pointer">
                                        <div className={`text-base ${t.done ? 'todo-done' : 'font-medium'}`}>{t.text}</div>
                                        {t.hasImage && <ModalThumbImage todoId={t.id} loadImage={loadImage} onView={setViewImage} />}
                                    </div>
                                    <div className="flex flex-col gap-1">
                                        <button onClick={() => startEdit(t)} className="text-slate-400 hover:text-sky-500 text-base px-1" title="수정">✎</button>
                                        <button onClick={() => startMove(t)} className="text-slate-400 hover:text-amber-500 text-base px-1" title="날짜 이동">📅</button>
                                        <button onClick={() => remove(t.id)} className="text-slate-300 hover:text-rose-500 text-xl px-1" title="삭제">×</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    ))}
                </div>
            </div>
        </div>
    );
};

// 오류 발생 시 흰 화면 대신 메시지 표시
class ErrorBoundary extends React.Component {
    constructor(props) { super(props); this.state = { error: null }; }
    static getDerivedStateFromError(e) { return { error: e }; }
    render() {
        if (this.state.error) {
            return (
                <div style={{padding:'2rem',textAlign:'center',color:'#ef4444'}}>
                    <div style={{fontSize:'2rem',marginBottom:'1rem'}}>⚠️</div>
                    <div style={{fontWeight:'bold',marginBottom:'0.5rem'}}>오류가 발생했습니다</div>
                    <div style={{fontSize:'0.875rem',color:'#64748b',marginBottom:'1rem'}}>{this.state.error.message}</div>
                    <button onClick={() => window.location.reload()}
                        style={{background:'#0f172a',color:'white',padding:'0.75rem 2rem',borderRadius:'1rem',border:'none',fontWeight:'bold',cursor:'pointer'}}>
                        새로고침
                    </button>
                </div>
            );
        }
        return this.props.children;
    }
}

ReactDOM.render(<ErrorBoundary><App /></ErrorBoundary>, document.getElementById('root'));
</script>
</body>
</html>
